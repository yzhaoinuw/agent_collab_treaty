# Copier configuration for the Agent Collab Treaty.
# https://copier.readthedocs.io/

_subdirectory: template
_min_copier_version: "9.0"
_exclude:
  - "{% if 'cursor' not in agent_pointers %}.cursor{% endif %}"
  - "{% if 'windsurf' not in agent_pointers %}.windsurf{% endif %}"

_message_after_copy: |
  Treaty installed. Next steps:
    1. Open AGENTS.md and fill in any remaining bracket-placeholders (env name,
       test/lint commands, project-specific reminders).
    2. If you selected optional agent pointer files, commit them with the treaty
       docs so those tools can find AGENTS.md automatically.
    3. At the end of substantive work sessions, update work_log.md and
       next_steps.md according to AGENTS.md.
  {% if include_treaty_badge %}
    4. (Recommended) Add the Agent Collab Treaty badge near the top of your README.md
       to signal adoption. The reliable single-color version uses shields.io (no external
       image hosting concerns on GitHub):

       ```markdown
       [![Agent Collab Treaty](https://img.shields.io/badge/Agent_Collab_Treaty-adopted-6d81f1?style=flat-square)](https://github.com/yzhaoinuw/agent_collab_treaty)
       ```

       Richer tri-color visual variant (central SVG, may not render for all viewers due to
       GitHub camo proxy limitations on raw SVGs):
       ```markdown
       [![Agent Collab Treaty](https://raw.githubusercontent.com/yzhaoinuw/agent_collab_treaty/main/assets/treaty-adopted.svg)](https://github.com/yzhaoinuw/agent_collab_treaty)
       ```
  {% endif %}

integration_branch:
  type: str
  help: "Your integration branch (the branch PRs merge into; usually main, master, or dev)"
  default: "main"

env_activation:
  type: str
  help: "Command to activate your dev environment (e.g. 'conda activate myenv' or 'source .venv/bin/activate'). Leave blank to fill in later."
  default: ""

test_command:
  type: str
  help: "Command to run the CI-equivalent test suite (e.g. 'pytest' or 'npm test'). Leave blank to fill in later."
  default: ""

agent_pointers:
  type: yaml
  multiselect: true
  help: "Optional agent-specific pointer files to generate so tools that do not natively load AGENTS.md still follow the treaty."
  choices:
    "Claude Code / Cowork (CLAUDE.md)": "claude-code"
    "Cursor project rule (.cursor/rules/treaty.mdc)": "cursor"
    "Windsurf workspace rule (.windsurf/rules/treaty.md)": "windsurf"
    "Aider config (.aider.conf.yml)": "aider"
  default: []

include_treaty_badge:
  type: bool
  default: false
  help: "Add the 'Agent Collab Treaty - adopted' badge (centrally hosted, zero files added to your repo). The image link points at this treaty repository so adopters get automatic updates if the badge design improves later."
