name: Release to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest

    # The PyPI trusted publisher must be configured for this repo + workflow
    # filename + environment. See README "Releasing to PyPI" for the one-time
    # setup steps.
    environment:
      name: pypi
      url: https://pypi.org/p/agent-collab-treaty

    permissions:
      # Required for trusted publishing (OIDC token exchange with PyPI).
      id-token: write
      # Required for softprops/action-gh-release to create the GitHub Release.
      contents: write

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
