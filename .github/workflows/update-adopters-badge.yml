name: Update adopters badge

# Refreshes the "adopters" badge in README.md from GitHub code search.
# Runs weekly (and on demand). Reuses scripts/count_adopters.sh as the engine.
#
# Note: code search via the default GITHUB_TOKEN works for public code in most
# cases. If it ever returns nothing here, set a repo secret ADOPTERS_TOKEN
# (a PAT with public_repo scope) and the job will prefer it. As a safety net,
# the badge is only rewritten when the count is > 0, so a failed/empty search
# never clobbers the displayed number with a 0.

on:
  schedule:
    - cron: "17 6 * * 1" # every Monday 06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Count adopters and update badge
        env:
          GH_TOKEN: ${{ secrets.ADOPTERS_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          out="$(./scripts/count_adopters.sh)"
          echo "$out"
          count="$(printf '%s\n' "$out" | sed -n 's/^ADOPTER_COUNT=//p')"
          if [ -z "${count:-}" ] || [ "$count" -le 0 ]; then
            echo "Count is empty or 0; leaving badge unchanged."
            exit 0
          fi
          sed -i -E "s/adopters-[0-9]+-6d81f1/adopters-${count}-6d81f1/" README.md

      - name: Commit if changed
        run: |
          set -euo pipefail
          if git diff --quiet -- README.md; then
            echo "No badge change."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update adopters badge count"
          git push
