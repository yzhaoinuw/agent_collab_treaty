name: Update adopters badge

# Refreshes the "adopters" badge in README.md from GitHub code search.
# Runs weekly (and on demand). Reuses scripts/count_adopters.sh as the engine.
#
# Note: code search via the default GITHUB_TOKEN has a low rate limit and shares
# runner IPs, so scheduled runs can hit HTTP 429 secondary rate limits. Set a
# repo secret ADOPTERS_TOKEN (a PAT with public_repo scope) to raise the limit;
# the job prefers it when present. Safety net: count_adopters.sh exits non-zero
# on any search failure/rate-limit, and this step only rewrites the badge when
# the script succeeds AND the count is a positive integer. A throttled run
# therefore leaves the displayed number unchanged instead of clobbering it.

on:
  schedule:
    - cron: "17 6 * * 1" # every Monday 06:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Count adopters and update badge
        env:
          GH_TOKEN: ${{ secrets.ADOPTERS_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          # Don't use `set -e` here: we want to inspect the script's exit code
          # rather than abort the step, so a failed/rate-limited search simply
          # leaves the badge unchanged.
          out="$(./scripts/count_adopters.sh)"; rc=$?
          echo "$out"
          if [ "$rc" -ne 0 ]; then
            echo "count_adopters.sh failed (rc=$rc); leaving badge unchanged."
            exit 0
          fi
          count="$(printf '%s\n' "$out" | sed -n 's/^ADOPTER_COUNT=//p')"
          if ! printf '%s' "${count:-}" | grep -qE '^[0-9]+$' || [ "$count" -le 0 ]; then
            echo "Count missing, non-numeric, or 0; leaving badge unchanged."
            exit 0
          fi
          sed -i -E "s/adopters-[0-9]+-6d81f1/adopters-${count}-6d81f1/" README.md

      - name: Commit if changed
        run: |
          set -euo pipefail
          if git diff --quiet -- README.md; then
            echo "No badge change."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update adopters badge count"
          git push
